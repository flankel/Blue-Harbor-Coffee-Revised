<!DOCTYPE html>

<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blue Harbor Coffee | Specialty Coffee Roaster</title>

  <!-- Tailwind -->

  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts -->

  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;600&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      color: #333;
    }

    .font-eng {
      font-family: 'Jost', sans-serif;
    }

    .page-enter {
      animation: fadeIn 0.6s ease-out forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .nav-link.active {
      border-bottom: 2px solid #3b82f6;
      color: #1d4ed8;
    }

    .nav-link.active svg {
      color: #1d4ed8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
  /* =========================
   スマホ用：孤立ワード防止
  ========================= */
  @media (max-width: 768px) {

    #hero-title,
    #concept-title,
    #concept-desc {
      word-break: keep-all;
      overflow-wrap: anywhere;
      line-break: strict;
      text-wrap: balance;
    }

  }
</style>

</head>

<body class="bg-white flex flex-col min-h-screen">

  <!-- Header -->

  <div id="header"></div>

  <main class="flex-grow">

<!-- HERO -->
<section class="relative h-[80vh] md:h-[600px] w-full bg-gray-900 overflow-hidden page-enter">
  <img src="/images/Home/hero.png" class="absolute inset-0 w-full h-full object-cover opacity-70">

  <div class="absolute inset-0 flex flex-col justify-center items-center text-center text-white px-4">
    <p id="hero-subtitle" class="font-eng tracking-[0.3em] text-sm md:text-base mb-4 text-blue-200"></p>
    <h2 id="hero-title" class="text-4xl md:text-6xl font-eng font-bold mb-8"></h2>
    <a href="/menu.html" id="hero-btn"
      class="bg-white text-gray-900 font-bold px-8 py-3 text-sm hover:bg-blue-600 hover:text-white transition duration-300"></a>
  </div>
</section>

<!-- CONCEPT -->
<section class="py-24 px-6 max-w-6xl mx-auto">

  <div class="text-center mb-20">
    <p id="concept-label" class="font-eng text-xs tracking-[0.3em] text-blue-600 mb-4"></p>
    <h2 id="concept-title" class="text-3xl md:text-4xl font-bold mb-6"></h2>
    <p id="concept-desc" class="text-gray-600 leading-loose max-w-2xl mx-auto"></p>
  </div>

  <!-- JS描画エリア -->
  <div id="sections"></div>

</section>

  </main>

  <!-- Footer -->

  <footer class="bg-gray-50 border-t border-gray-200 py-12 text-center text-xs text-gray-400 font-eng">
    © 2024 Blue Harbor Coffee Roasters.
  </footer>

  <!-- Scripts -->

  <script src="/js/components/loadHeader.js"></script>

  <script src="/js/pages/renderHome.js"></script>

</body>

</html>
