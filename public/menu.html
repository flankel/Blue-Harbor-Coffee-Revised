<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu | Blue Harbor Coffee</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;600&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
  body {
    font-family: 'Zen Kaku Gothic New', sans-serif;
    color: #333;
  }
  .font-eng {
    font-family: 'Jost', sans-serif;
  }
  .page-enter {
    animation: fadeIn 0.6s ease-out forwards;
  }
  @keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(10px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
  }
  .nav-link.active {
    border-bottom: 2px solid #3b82f6;
    color: #1d4ed8;
  }
  .nav-link.active svg {
    color: #1d4ed8;
  }
  .menu-board {
    background-color: #1a1a1a;
    color: #f8f8f8;
    border: 12px solid #3d2b1f;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
  }
  .menu-board p {
    font-size: 15px;
    color: #d1d5db;
    line-height: 1.7;
    margin-top: 4px;
    letter-spacing: 0.02em;
  }
  @media (min-width:768px) {
    .menu-board p {
      font-size: 16px;
    }
  }
  .menu-list {
    display: flex;
    flex-direction: column;
    gap: 40px;
  }
  .menu-item {
    display: flex;
    gap: 20px;
    align-items: flex-start;
  }
  .menu-item img {
    width: 112px;
    height: 112px;
    object-fit: cover;
  }
    
  @media (max-width: 640px) {
    #setmenu ul {
      list-style-position: outside;
      padding-left: 1.25rem;
    }

    #setmenu li {
      word-break: keep-all;
      overflow-wrap: break-word;
    }

  }
  /* ヘッダー前面 */
  #header {
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 9999;
  }
  </style>
</head>

<body class="bg-gray-100 flex flex-col min-h-screen">
  <!-- HEADER -->
  <div id="header">
  </div>

  <!-- ★ここだけ修正（超重要） -->
  <main class="flex-grow pt-[160px] md:pt-[120px] bg-[url('/images/Home/hero.png')] bg-cover bg-fixed">
    <div class="py-12 md:py-20 px-4">
      <div class="max-w-5xl mx-auto menu-board p-8 md:p-16 rounded-sm relative page-enter">
        <div class="text-center mb-16">
          <h2 class="text-4xl md:text-6xl font-eng font-bold tracking-tighter mb-2">TODAY'S MENU</h2>
          <p class="text-blue-400 font-eng text-sm tracking-widest uppercase">Freshly Roasted in our Harbor</p>
        </div>

        <section id="setmenu" class="mb-20">
        </section>

        <div class="grid md:grid-cols-2 gap-16">
          <section id="coffee">
          </section>
          <section id="food">
          </section>
        </div>

        <div class="mt-20 pt-10 border-t border-white/10 text-center">
          <p class="text-gray-500 text-xs font-eng tracking-widest">
            価格は全て税抜き表示です。一部商品はお持ち帰りできます。
          </p>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-gray-50 border-t border-gray-200 py-12 text-center text-xs text-gray-400 font-eng">
    © 2024 Blue Harbor Coffee Roasters.
  </footer>

<script src="/js/components/loadHeader.js"></script>
<script src="/js/pages/menu.js"></script>

</body>

</html>
